name: "Linting"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  pylint:
    name: "Python Code Quality and Lint (${{ matrix.group }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - group: linting
            commands: |
              uv run pylint ebd_toolchain
              uv run pylint unittests --rcfile=unittests/.pylintrc
          - group: type_check
            commands: |
              uv run mypy --show-error-codes src/ebd_toolchain --strict
              uv run mypy --show-error-codes unittests --strict
          - group: spell_check
            commands: |
              uv run codespell --ignore-words=domain-specific-terms.txt src
              uv run codespell --ignore-words=domain-specific-terms.txt README.md
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: 3.14
      - name: Install dependencies
        run: uv sync --locked --group ${{ matrix.group }}
      - name: Run ${{ matrix.group }} via uv
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: ${{ matrix.commands }}
